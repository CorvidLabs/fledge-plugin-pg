name: trust

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  trust:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: pg
          POSTGRES_PASSWORD: pg
          POSTGRES_DB: pgtest
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pg"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PG_TEST_URL: postgres://pg:pg@localhost:5432/pgtest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Install native verification tools
        run: sudo apt-get update && sudo apt-get install -y jq postgresql-client shellcheck
      - name: CorvidLabs Trust gate
        id: trust
        uses: CorvidLabs/trust@9d32b5786d2e9e4d39fc581c0091c721ee3d4226 # v1.0.0
