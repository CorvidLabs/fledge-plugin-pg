name: test

on:
  push:
    branches: [main]
    paths:
      - bin/**
      - test/**
      - .github/workflows/test.yml
  pull_request:
    branches: [main]
    paths:
      - bin/**
      - test/**
      - .github/workflows/test.yml

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: pg
          POSTGRES_PASSWORD: pg
          POSTGRES_DB: pgtest
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pg"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      PG_TEST_URL: postgres://pg:pg@localhost:5432/pgtest

    steps:
      - uses: actions/checkout@v5

      - name: Install psql client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Verify dependencies
        run: |
          which bash psql jq python3
          bash --version
          psql --version
          python3 --version

      - name: Shell-syntax check
        run: bash -n bin/fledge-pg

      - name: ShellCheck
        run: |
          sudo apt-get install -y shellcheck
          shellcheck bin/fledge-pg

      - name: Run integration tests
        run: python3 test/test.py
