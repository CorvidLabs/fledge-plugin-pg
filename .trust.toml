schema_version = 1
profile = "standard"

[lifecycle]
command = ["fledge", "lanes", "run", "verify"]

[contract]
enabled = true
require_coverage = 0
skip_reason = "SpecSync does not measure the extensionless Bash executable; ShellCheck, syntax, and guarded query integration tests are blocking"

[risk]
threshold = "block"

[provenance]
mode = "soft"
policy = ".attest.json"
skip_reason = ""

[atlas]
enabled = false
skip_reason = "Trust-managed Atlas publication is disabled for the initial rollout"
